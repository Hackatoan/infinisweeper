<!DOCTYPE html>
<html lang="en">
  <head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6042152415983682" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Infinite Minesweeper</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="ad-container" class="ad-container"></div>
    <div id="notification" class="notification"></div>
    <div id="board" class="board"></div>
    <div id="toast" class="toast">Game Over! You hit a mine.</div>
    <div id="score-overlay" class="score-overlay">Score: 0</div>
    <button id="restart-btn" class="restart-btn" onclick="restartGame()">
      Restart
    </button>
    <button
      id="leaderboard-btn"
      class="leaderboard-btn"
      onclick="gotoLeaderboard()"
    >
      Leaderboard
    </button>
    <div id="submit-score" class="submit-score" style="display: none">
      <input type="text" id="username" placeholder="Enter your username" />
      <button id="submit-score-button">Submit Score</button>
      <button id="export-png-btn-gameover" class="export-png-btn" onclick="exportMapPNG()">Export PNG</button>
    </div>
    <div class="info-area">
      <div class="info-icon">i</div>
      <div class="keybinds-tooltip">
        <strong>Keybinds:</strong><br>
        WASD / Arrows: Move<br>
        C: Jump to Center<br>
        L: Jump to Last Click<br>
        Left-Click: Reveal cell<br>
        Right-Click: Toggle Flag<br><br>
        <button id="export-png-btn-info" class="export-png-btn" onclick="exportMapPNG()">Export PNG Map</button>
      </div>
    </div>
    <a href="https://hackatoa.com/" class="hackatoa-banner" target="_blank">Hackatoa.com</a>
  </body>
</html>
