<!DOCTYPE html>
<html lang="en">
  <head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6042152415983682" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="/__/firebase/init.js"></script>
    <script src="script.js"></script>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#3e2723" />
    <meta name="description" content="Play Infinite Minesweeper, an endless and infinitely expanding game of minesweeper! Reveal safe cells, flag mines, and climb the leaderboard." />
    <meta name="keywords" content="Minesweeper, infinite minesweeper, endless game, browser game, logic puzzle, hackatoa" />
    <meta name="author" content="Hackatoa" />
    <meta property="og:title" content="Infinite Minesweeper" />
    <meta property="og:description" content="An endless game of minesweeper! How far can you go?" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://infinisweeper.hackatoa.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Infinite Minesweeper" />
    <meta name="twitter:description" content="An endless game of minesweeper! How far can you go?" />
    <link rel="canonical" href="https://infinisweeper.hackatoa.com/" />
    <title>Infinite Minesweeper</title>
    <link rel="stylesheet" href="styles.css" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "Infinite Minesweeper",
      "url": "https://infinisweeper.hackatoa.com/",
      "description": "An endless game of minesweeper! How far can you go?",
      "genre": "Puzzle",
      "playMode": "SinglePlayer",
      "applicationCategory": "Game",
      "author": {
        "@type": "Person",
        "name": "Hackatoa",
        "url": "https://hackatoa.com/"
      }
    }
    </script>
  </head>
  <body>
    <h1 class="sr-only">Infinite Minesweeper</h1>
    <div id="ad-container" class="ad-container"></div>
    <div id="notification" class="notification"></div>
    <div id="board" class="board"></div>
    <div id="toast" class="toast">Game Over! You hit a mine.</div>
    <div id="score-overlay" class="score-overlay">Score: 0</div>
    <button id="restart-btn" class="restart-btn" onclick="restartGame()">
      Restart
    </button>
    <button
      id="leaderboard-btn"
      class="leaderboard-btn"
      onclick="gotoLeaderboard()"
    >
      Leaderboard
    </button>
    <div id="submit-score" class="submit-score" style="display: none">
      <input type="text" id="username" placeholder="Enter your username" />
      <button id="submit-score-button">Submit Score</button>
      <button id="export-png-btn-gameover" class="export-png-btn" onclick="exportMapPNG()">Export PNG</button>
    </div>

    <div id="zoom-controls" class="zoom-controls">
      <button onclick="zoomIn()">+</button>
      <button onclick="zoomOut()">-</button>
    </div>
    <div id="mobile-mode-toggle" class="mobile-mode-toggle">
      <button id="mode-toggle-btn" class="active" onclick="toggleMode()"><span class="flag-x">🚩</span></button>

    </div>

    <div class="info-area">
      <div class="info-icon">i</div>
      <div class="keybinds-tooltip">
        <strong>Keybinds:</strong><br>
        WASD / Arrows: Move<br>
        C: Jump to Center<br>
        L: Jump to Last Click<br>
        Left-Click: Reveal cell<br>
        Right-Click: Toggle Flag<br><br>
        <button id="export-png-btn-info" class="export-png-btn" onclick="exportMapPNG()">Export PNG Map</button>
        <br>
        <button id="info-submit-score-btn" class="export-png-btn" onclick="promptSubmitScore()">Submit Score</button>
      </div>
    </div>
    <a href="https://hackatoa.com/" class="hackatoa-banner" target="_blank">Hackatoa.com</a>
  </body>
</html>
