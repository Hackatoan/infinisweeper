<!DOCTYPE html>
<html lang="en">
  <head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6042152415983682" crossorigin="anonymous"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3e2723" />
    <meta name="description" content="View the top scores and most recent games of Infinite Minesweeper. See how you rank against other players!" />
    <meta name="keywords" content="Minesweeper leaderboard, infinite minesweeper scores, top players, high scores" />
    <meta name="author" content="Hackatoa" />
    <meta property="og:title" content="Leaderboard - Infinite Minesweeper" />
    <meta property="og:description" content="Check out the high scores and recent players on Infinite Minesweeper." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://infinisweeper.hackatoa.com/leaderboard" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Leaderboard - Infinite Minesweeper" />
    <meta name="twitter:description" content="Check out the high scores and recent players on Infinite Minesweeper." />
    <link rel="canonical" href="https://infinisweeper.hackatoa.com/leaderboard" />
    <title>Leaderboard - Infinite Minesweeper</title>
    <link rel="stylesheet" href="lbstyle.css" />
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="leaderboard.js" defer></script>
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.png" />
    <link rel="manifest" href="./site.webmanifest" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Leaderboard - Infinite Minesweeper",
      "url": "https://infinisweeper.hackatoa.com/leaderboard",
      "description": "Check out the high scores and recent players on Infinite Minesweeper.",
      "isPartOf": {
        "@type": "WebSite",
        "name": "Infinite Minesweeper",
        "url": "https://infinisweeper.hackatoa.com/"
      }
    }
    </script>
  </head>
  <body>
    <div id="ad-container" class="ad-container"></div>
    <h1>Leaderboard</h1>



    <div class="tabs">
      <button id="tab-score" class="tab-btn active" onclick="switchTab('score')">Top Scores</button>
      <button id="tab-recent" class="tab-btn" onclick="switchTab('recent')">Recent</button>
    </div>
    <div id="leaderboard-container">
      <div id="section-score" class="leaderboard-section active-tab">
        <h2 class="leaderboard-title" style="display:none">Leaderboard by Score</h2>
        <ul id="leaderboard-by-score"></ul>
      </div>
      <div id="section-recent" class="leaderboard-section">
        <h2 class="leaderboard-title" style="display:none">Leaderboard by Most Recent</h2>
        <ul id="leaderboard-by-recent"></ul>
      </div>
    </div>
    <center>
      <button id="back-btn" class="back-btn" onclick="gotohome()">
        Return to Game
      </button>
      <div class="footer-links">
        <a href="https://hackatoa.com/" target="_blank">Hackatoa.com</a> |
        <a href="https://github.com/Hackatoan/infinisweeper" target="_blank">Source Code</a> |
        <a href="https://buymeacoffee.com/hackatoa" target="_blank">Buy me a coffee</a>
      </div>
    </center>
    <div id="rules-container" style="max-width: 800px; margin: 20px auto; padding: 20px; background-color: #261410; color: #fbe9e7; border-radius: 8px;">
      <h2>Scoring Rules</h2>
      <p>Points are awarded immediately upon revealing a safe tile:</p>
      <ul>
        <li><strong>Safe Move (1 point):</strong> You earn 1 point for every safely revealed space (not a mine).</li>
      </ul>
    </div>
  </body>
</html>
