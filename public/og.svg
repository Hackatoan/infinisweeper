<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3e2e28"/>
      <stop offset="100%" style="stop-color:#1a0e0b"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigblur"><feGaussianBlur stdDeviation="60"/></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Red glow center-left -->
  <ellipse cx="300" cy="315" rx="300" ry="250" fill="#7c2d12" opacity="0.3" filter="url(#bigblur)"/>
  <!-- Infinite expanding grid background -->
  <g opacity="0.15" stroke="#846358" stroke-width="1" fill="none">
    <!-- Row 1 -->
    <rect x="20" y="20" width="50" height="50" rx="3"/><rect x="75" y="20" width="50" height="50" rx="3"/>
    <rect x="130" y="20" width="50" height="50" rx="3"/><rect x="185" y="20" width="50" height="50" rx="3"/>
    <rect x="240" y="20" width="50" height="50" rx="3"/>
    <!-- Row 2 -->
    <rect x="20" y="75" width="50" height="50" rx="3"/><rect x="75" y="75" width="50" height="50" rx="3"/>
    <rect x="130" y="75" width="50" height="50" rx="3"/><rect x="185" y="75" width="50" height="50" rx="3"/>
    <rect x="240" y="75" width="50" height="50" rx="3"/>
    <!-- Row 3 -->
    <rect x="20" y="130" width="50" height="50" rx="3"/><rect x="75" y="130" width="50" height="50" rx="3"/>
    <rect x="130" y="130" width="50" height="50" rx="3"/><rect x="185" y="130" width="50" height="50" rx="3"/>
    <rect x="240" y="130" width="50" height="50" rx="3"/>
  </g>
  <!-- Main game grid (revealed) -->
  <g transform="translate(120,200)">
    <!-- Grid cells with numbers -->
    <g>
      <!-- Row 1 -->
      <rect x="0" y="0" width="70" height="70" rx="5" fill="#2a1a14" stroke="#5a3a30" stroke-width="2"/>
      <text x="35" y="46" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#3b82f6">1</text>
      <rect x="75" y="0" width="70" height="70" rx="5" fill="#2a1a14" stroke="#5a3a30" stroke-width="2"/>
      <text x="110" y="46" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#3b82f6">2</text>
      <rect x="150" y="0" width="70" height="70" rx="5" fill="#2a1a14" stroke="#5a3a30" stroke-width="2"/>
      <text x="185" y="46" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#22c55e">3</text>
      <rect x="225" y="0" width="70" height="70" rx="5" fill="#3a1a0a" stroke="#846358" stroke-width="2"/>
      <!-- Flag -->
      <line x1="260" y1="55" x2="260" y2="15" stroke="#f43f5e" stroke-width="3" stroke-linecap="round"/>
      <polygon points="260,15 290,28 260,41" fill="#f43f5e"/>
      <!-- Row 2 -->
      <rect x="0" y="75" width="70" height="70" rx="5" fill="#2a1a14" stroke="#5a3a30" stroke-width="2"/>
      <text x="35" y="121" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#f59e0b">4</text>
      <rect x="75" y="75" width="70" height="70" rx="5" fill="#2a1a14" stroke="#5a3a30" stroke-width="2"/>
      <text x="110" y="121" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="#f59e0b">5</text>
      <!-- BOOM cell -->
      <rect x="150" y="75" width="70" height="70" rx="5" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
      <circle cx="185" cy="110" r="16" fill="#ef4444"/>
      <line x1="185" y1="86" x2="185" y2="94" stroke="#fca5a5" stroke-width="3" stroke-linecap="round"/>
      <line x1="185" y1="126" x2="185" y2="134" stroke="#fca5a5" stroke-width="3" stroke-linecap="round"/>
      <line x1="161" y1="110" x2="169" y2="110" stroke="#fca5a5" stroke-width="3" stroke-linecap="round"/>
      <line x1="201" y1="110" x2="209" y2="110" stroke="#fca5a5" stroke-width="3" stroke-linecap="round"/>
      <rect x="225" y="75" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="2"/>
      <!-- Unrevealed cells -->
      <rect x="0" y="150" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="2"/>
      <rect x="75" y="150" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="2"/>
      <rect x="150" y="150" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="2"/>
      <rect x="225" y="150" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="2"/>
    </g>
    <!-- Expanding ghost cells right -->
    <rect x="300" y="0" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.4"/>
    <rect x="375" y="0" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.2"/>
    <rect x="300" y="75" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.4"/>
    <rect x="375" y="75" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.2"/>
    <!-- Expanding ghost cells below -->
    <rect x="0" y="225" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.4"/>
    <rect x="75" y="225" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.4"/>
    <rect x="150" y="225" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.4"/>
    <rect x="0" y="300" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.2"/>
    <rect x="75" y="300" width="70" height="70" rx="5" fill="#3a2a24" stroke="#846358" stroke-width="1" opacity="0.2"/>
    <!-- Infinity arrow -->
    <text x="450" y="110" font-size="60" fill="#846358" opacity="0.6">→∞</text>
  </g>
  <!-- Title -->
  <text x="820" y="230" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="66" font-weight="900" letter-spacing="2" fill="#fbcfe8">INFINI</text>
  <text x="820" y="310" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="66" font-weight="900" letter-spacing="2" fill="#f43f5e" filter="url(#glow)">SWEEPER</text>
  <text x="820" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" letter-spacing="5" fill="#a18072">ENDLESS  ·  LEADERBOARD  ·  FREE</text>
  <line x1="560" y1="160" x2="560" y2="500" stroke="#846358" stroke-width="1" opacity="0.3"/>
  <rect x="0" y="580" width="1200" height="50" fill="#1a0e0b" opacity="0.7"/>
  <text x="600" y="612" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#846358" letter-spacing="4">HACKATOA GAMES  ·  games.hackatoa.com</text>
</svg>
